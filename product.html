<!DOCTYPE html>
<html>
<head>
  <title>Add Product</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📦 Add Product</h2>

<form id="productForm">
  <input type="text" id="farmerName" placeholder="Farmer Name" required><br><br>
  <input type="text" id="farmerPhone" placeholder="Farmer Phone" required><br><br>
  <input type="text" id="productName" placeholder="Product Name" required><br><br>
  <input type="number" id="price" placeholder="Price" required><br><br>
  <input type="number" id="quantity" placeholder="Quantity" required><br><br>

  <!-- NEW IMAGE FIELD -->
  <input type="file" id="productImage" accept="image/webp,image/*" required><br><br>

  <button type="submit">Add Product</button>
</form>

<script src="script.js"></script>

</body>
</html>
